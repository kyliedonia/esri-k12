<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Feature Details Viewer</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2em; }
    .feature-details { margin-top: 1em; }
    .feature-details table { border-collapse: collapse; width: 100%; }
    .feature-details th, .feature-details td { border: 1px solid #ccc; padding: 8px; }
    .feature-details th { background: #f4f4f4; }
  </style>
</head>
<body>
  <h1>Feature Details Viewer</h1>
  <label for="globalid">Enter GlobalID:</label>
  <input type="text" id="globalid" size="40" placeholder="e.g. 12345678-90ab-cdef-1234-567890abcdef">
  <button onclick="fetchFeatureFromInput()">Show Details</button>

  <div class="feature-details" id="details"></div>

  <script>
    const serviceUrl = "https://services3.arcgis.com/ixehHGhSDmBKeOyS/arcgis/rest/services/survey123_6b133771b54c46e4a4db787cbf1867f4_stakeholder/FeatureServer/0/query";

    function getUrlParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    // This function fetches feature details given a globalid
    function fetchFeature(globalid) {
      if (!globalid) {
        document.getElementById('details').innerHTML = "<p>Please enter a GlobalID.</p>";
        return;
      }
      document.getElementById('globalid').value = globalid;
      const url = `${serviceUrl}?where=GlobalID='${globalid}'&outFields=*&f=json`;

      fetch(url)
        .then(response => response.json())
        .then(data => {
          if (data.features && data.features.length > 0) {
            const attrs = data.features[0].attributes;
            let html = "<h2>Feature Details</h2><table>";
            for (const key in attrs) {
  html += `<tr><th>${key}</th><td>${attrs[key]}</td></tr>`;
}
            html += "</table>";
            document.getElementById('details').innerHTML = html;
          } else {
            document.getElementById('details').innerHTML = "<p>No feature found for this GlobalID.</p>";
          }
        })
        .catch(err => {
          document.getElementById('details').innerHTML = "<p>Error fetching feature details.</p>";
        });
    }

    // This function is called by the button
    function fetchFeatureFromInput() {
      const globalid = document.getElementById('globalid').value.trim();
      fetchFeature(globalid);
    }

    // On page load, check for globalid in URL
    window.onload = function() {
      const globalid = getUrlParam('globalid');
      if (globalid) {
        fetchFeature(globalid);
      }
    };
  </script>
</body>
</html>
